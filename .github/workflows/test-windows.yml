name: Test Windows Build

on:
  workflow_dispatch:

concurrency:
  group: test-windows
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-windows:
    runs-on: windows-latest
    name: Test Windows (npm ci + build + package)

    steps:
      - uses: actions/checkout@v4

      # ── Set up MSVC ────────────────────────────────────────────────────
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # ── Setup Node.js ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Install Python (for node-gyp) ──────────────────────────────────
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Tell node-gyp to use VS 2022 ──────────────────────────────────
      - name: Configure node-gyp for VS 2022
        shell: powershell
        run: echo "GYP_MSVS_VERSION=2022" >> $env:GITHUB_ENV

      # ── npm ci (the step that's been failing) ──────────────────────────
      - name: Install dependencies
        run: npm ci
        env:
          GYP_MSVS_VERSION: "2022"

      # ── Build MCP server (separate npm project) ────────────────────────
      - name: Build MCP server
        working-directory: mcp
        run: |
          npm ci
          npm run build

      # ── Build app ──────────────────────────────────────────────────────
      - name: Build app
        run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Show build output
        if: always()
        shell: powershell
        run: |
          if (Test-Path release) {
            Get-ChildItem release | ForEach-Object {
              Write-Host "  $($_.Name) — $([math]::Round($_.Length / 1MB, 1)) MB"
            }
          } else {
            Write-Host "No release directory"
          }
