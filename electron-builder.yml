appId: com.conduit.app
productName: Conduit
directories:
  output: release
asar: true
# sharp ships its native addon (@img/sharp-<platform>) and the libvips shared
# library (@img/sharp-libvips-<platform>) as separate packages. electron-builder
# only auto-unpacks module dirs that contain a .node file, so the addon gets
# unpacked but the sidecar libvips .so/.dylib stays sealed inside app.asar. The
# addon's rpath ($ORIGIN/../../sharp-libvips-<platform>/lib) then can't dlopen it,
# crashing the app on launch (ERR_DLOPEN_FAILED: libvips-cpp.so... not found —
# seen on Linux x64, see issue #6). Force both onto the real filesystem.
asarUnpack:
  - "**/node_modules/sharp/**"
  - "**/node_modules/@img/**"
files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: resources/icons/
    to: icons/
    filter:
      - "**/*"
  - from: mcp/dist/
    to: mcp/dist/
    filter:
      - "**/*"
  - from: mcp/node_modules/
    to: mcp/node_modules/
    filter:
      - "**/*"
  - from: mcp/package.json
    to: mcp/package.json
afterPack: scripts/afterPack.cjs
mac:
  category: public.app-category.developer-tools
  icon: build/icons/icon.icns
  darkModeSupport: true
  # All modern Macs are Apple Silicon — build arm64 only. CI also passes
  # --mac --arm64; pinning here keeps local `npm run build:mac` arm64 even on a
  # Rosetta-capable host.
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true
  extendInfo:
    NSLocalNetworkUsageDescription: "Conduit needs access to your local network to connect to devices via SSH, RDP, VNC, and web sessions."
  extraResources:
    - from: freerdp-helper/bundle/darwin/
      to: freerdp/
      filter:
        - "**/*"
win:
  icon: build/icons/icon.ico
  artifactName: "${productName}-Setup-${version}.${ext}"
  # Windows ships x64 only (CI passes --win --x64).
  target:
    - target: nsis
      arch:
        - x64
  forceCodeSigning: false
  signAndEditExecutable: false
  extraResources:
    - from: freerdp-helper/bundle/win32/
      to: freerdp/
      filter:
        - "**/*"
    - from: webview2-helper/bundle/win-x64/
      to: webview2/
      filter:
        - "**/*"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icons/icon.ico
  uninstallerIcon: build/icons/icon.ico
  installerSidebar: build/installerSidebar.bmp
  uninstallerSidebar: build/installerSidebar.bmp
  include: build/installer.nsh
linux:
  icon: build/icons/icon.png
  target:
    - AppImage
    - deb
  extraResources:
    - from: freerdp-helper/bundle/linux/
      to: freerdp/
      filter:
        - "**/*"
fileAssociations:
  - ext: conduit
    name: Conduit Vault
    description: Conduit Vault File
    mimeType: application/x-conduit-vault
    role: Editor
protocols:
  - name: Conduit
    schemes:
      - conduit
publish:
  provider: github
  owner: advenimus
  repo: conduit-desktop
npmRebuild: true
